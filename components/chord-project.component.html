<div id="chordProject">
  <div id="chordProjectEditor"></div>
  <div id="chordProjectRenderer"></div>
</div>

<script type="text/javascript">
  async function getFileContent(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = function (event) {
        const fileContent = event.target.result;
        resolve(fileContent);
      };
      reader.onerror = function () {
        reject(reader.error);
      };
      reader.readAsText(file, "UTF-8");
    });
  }

  function getEditorContent() {
    return ChordProjectEditor.Main.getEditor().getValue();
  }

  function renderChordProject(chordSheet) {
    const cp = new ChordProjectParser.ChordProParser();
    const song = cp.parse(chordSheet);
    // const transposedSong = ChordProjectParser.Transposer.transpose(
    //   song,
    //   new ChordProjectParser.MusicNote(ChordProjectParser.MusicLetter.A, ChordProjectParser.MusicAccidental["#"]),
    // );

    const settings = new ChordProjectParser.FormatterSettings();
    settings.showMetadata = true;
    settings.showTabs = true;
    settings.useSimpleChord = false;
    settings.showChords = true;

    const formatter = new ChordProjectParser.HtmlFormatter(settings);
    const result = formatter.format(song);
    const renderer = document.getElementById("chordProjectRenderer");
    renderer.innerHTML = `${result.join("\n")}`;
  }

  (async () => {
    const fileResponse = await fetch("Praise Adonai.cho");
    const chordSheet = await fileResponse.text();

    ChordProjectEditor.Main.init();
    ChordProjectEditor.Main.run(chordSheet);
    renderChordProject(chordSheet);
  })();
</script>
