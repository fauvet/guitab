<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GuiTab</title>
    <link rel="icon" href="logo.svg" sizes="any" type="image/svg+xml" />
    <link rel="manifest" href="manifest.webmanifest" />

    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons" />
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css" />

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="container-actions">
      <span id="action-open-file" class="material-icons">file_open</span>
      <span id="action-save-file" class="material-icons">save</span>
      <span id="action-zoom-in" class="material-icons">zoom_in</span>
      <span id="action-zoom-out" class="material-icons">zoom_out</span>
    </div>
    <div id="chordProject">
      <div id="chordProjectEditor"></div>
      <div id="chordProjectRenderer"></div>
    </div>
  </body>
  <script type="text/javascript" src="lib/chordproject-editor.bundle.js"></script>
  <script type="text/javascript" src="lib/chordproject-parser.bundle.js"></script>
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
  <script type="text/javascript" src="index.js"></script>
</html>
